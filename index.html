    <title>Felipe León del Pedregal - ASMAR</title>
    <style>
        :root {
            --azul-asmar: #112d5d;
            --gris-oscuro: #1a1a1a;
            --gris-subtil: #555555;
            --blanco: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 15px;
            box-sizing: border-box;
        }

        .card { 
            background-color: var(--blanco); 
            width: 100%; 
            max-width: 400px; 
            padding: 40px 25px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.15); 
            text-align: center;
            border-bottom: 12px solid var(--azul-asmar);
            border-radius: 12px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card > * { position: relative; z-index: 1; width: 100%; }

        .logo { 
            width: 170px; 
            margin-bottom: 25px;
            height: auto;
        }

        .nombre-container {
            width: 108%; 
            margin-left: -4%;
            margin-right: -4%;
            height: 50px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .nombre-svg { 
            width: 100%; 
            height: 100%; 
            overflow: visible;
        }

        .nombre-text {
            font-family: 'Segoe UI', sans-serif;
            font-weight: 700;
            fill: var(--azul-asmar);
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .cargo { 
            font-size: 14px; 
            color: var(--gris-subtil); 
            margin-bottom: 35px;
            line-height: 1.5;
            text-align: center;
            font-weight: 500; 
            letter-spacing: 0.3px;
        }

        .cargo span { display: block; }

        .contact-list-container {
            width: 100%;
            margin-bottom: 35px;
            display: flex;
            flex-direction: column;
            align-items: center; 
        }

        .contact-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
        }

        .contact-item {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--gris-oscuro);
            margin-bottom: 16px;
            width: 100%;
        }

        .contact-icon svg {
            width: 22px; height: 22px;
            fill: var(--azul-asmar); 
            margin-right: 12px;
            flex-shrink: 0;
        }

        .contact-text { 
            font-size: 17px; 
            font-weight: 600; 
            white-space: nowrap;
            text-align: left;
        }

        .actions-container { 
            display: flex; 
            justify-content: space-between;
            gap: 10px; 
            width: 100%;
            margin-top: 10px;
        }

        .action-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            flex: 1;
        }

        .btn-round { 
            background: var(--azul-asmar); 
            border: none; 
            width: 52px; 
            height: 52px; 
            border-radius: 50%;
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .btn-round:active { transform: scale(0.95); }

        .btn-round svg { 
            width: 24px; 
            height: 24px; 
            fill: var(--blanco) !important; 
        }

        .action-label { 
            font-size: 10px; 
            color: var(--azul-asmar); 
            font-weight: bold; 
            margin-top: 10px; 
            text-transform: uppercase;
            line-height: 1.2;
            max-width: 90px;
            text-align: center;
        }
    </style>
